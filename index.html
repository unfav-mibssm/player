<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>StreamVault — Cinematic Player</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/player.css" />
  <link rel="stylesheet" href="css/menus.css" />
</head>
<body>

  <!-- App Shell -->
  <div id="app">

    <!-- Header -->
    <header id="site-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">▶</span>
          <span class="logo-text">Stream<em>Vault</em></span>
        </div>
        <div class="header-tagline">Cinematic Streaming</div>
      </div>
    </header>

    <!-- Hero Input Section -->
    <section id="hero" class="hero-section">
      <div class="hero-bg">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
      </div>
      <div class="hero-content">
        <h1 class="hero-title">Paste. Play. Experience.</h1>
        <p class="hero-subtitle">Stream any video directly — MP4, MKV, HLS/M3U8</p>

        <div class="url-input-wrapper" id="url-input-wrapper">
          <div class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </div>
          <input
            type="url"
            id="video-url-input"
            placeholder="Paste video URL here..."
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <button id="clear-btn" class="clear-btn" title="Clear" aria-label="Clear input">✕</button>
        </div>

        <div class="action-row">
          <button id="play-btn" class="play-btn">
            <span class="play-btn-icon">▶</span>
            <span>Play Video</span>
          </button>
          <label class="subtitle-upload-btn" title="Load external subtitle file">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>Subtitles</span>
            <input type="file" id="subtitle-file-input" accept=".srt,.vtt" hidden />
          </label>
        </div>

        <div id="error-banner" class="error-banner hidden">
          <span class="error-icon">⚠</span>
          <span id="error-text"></span>
          <button id="error-close" class="error-close">✕</button>
        </div>

        <!-- Quick format tips -->
        <div class="format-chips">
          <span class="chip">MP4</span>
          <span class="chip">MKV</span>
          <span class="chip">M3U8</span>
          <span class="chip">HLS</span>
          <span class="chip">H.264</span>
          <span class="chip">HEVC</span>
        </div>
      </div>
    </section>

    <!-- Player Section (hidden until video loads) -->
    <section id="player-section" class="player-section hidden">
      <div class="player-container" id="player-container">

        <!-- Video Element -->
        <div class="video-wrapper" id="video-wrapper">
          <video id="main-video" playsinline webkit-playsinline></video>

          <!-- Gesture Overlay for double-tap seek -->
          <div id="gesture-left" class="gesture-zone gesture-left">
            <div class="gesture-ripple" id="ripple-left">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
              <span id="seek-label-left">-10s</span>
            </div>
          </div>
          <div id="gesture-right" class="gesture-zone gesture-right">
            <div class="gesture-ripple" id="ripple-right">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.93V8.07L8.5 12z"/><path d="M16 6h2v12h-2z"/></svg>
              <span id="seek-label-right">+10s</span>
            </div>
          </div>

          <!-- Center play/pause tap indicator -->
          <div id="tap-indicator" class="tap-indicator">
            <div id="tap-icon" class="tap-icon">▶</div>
          </div>

          <!-- Loading Spinner -->
          <div id="loading-spinner" class="loading-spinner hidden">
            <div class="spinner-ring"></div>
            <div class="spinner-ring ring-2"></div>
            <span class="buffering-label">Buffering…</span>
          </div>

          <!-- Controls Overlay -->
          <div id="controls-overlay" class="controls-overlay">

            <!-- Top bar -->
            <div class="controls-top">
              <button id="back-btn" class="ctrl-btn back-btn" title="Back to home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <div class="video-title-display" id="video-title-display">Loading…</div>
              <div class="top-actions">
                <button id="pip-btn" class="ctrl-btn" title="Picture in Picture">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><rect x="13" y="10" width="8" height="6" rx="1" fill="currentColor" stroke="none"/></svg>
                </button>
              </div>
            </div>

            <!-- Bottom bar -->
            <div class="controls-bottom">
              <!-- Progress -->
              <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar">
                  <div class="progress-buffered" id="progress-buffered"></div>
                  <div class="progress-played" id="progress-played"></div>
                  <div class="progress-thumb" id="progress-thumb"></div>
                </div>
                <div class="time-display">
                  <span id="current-time">0:00</span>
                  <span class="time-sep">/</span>
                  <span id="total-time">0:00</span>
                </div>
              </div>

              <!-- Control buttons -->
              <div class="control-buttons">
                <div class="ctrl-left">
                  <button id="play-pause-btn" class="ctrl-btn play-pause-btn" title="Play/Pause (Space)">
                    <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                  </button>

                  <button id="rewind-btn" class="ctrl-btn" title="Rewind 10s (Left arrow)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6 8.5 6V6l-8.5 6z"/></svg>
                  </button>

                  <button id="forward-btn" class="ctrl-btn" title="Forward 10s (Right arrow)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                  </button>

                  <div class="volume-group">
                    <button id="mute-btn" class="ctrl-btn" title="Mute (M)">
                      <svg id="vol-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                      <svg id="mute-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="hidden"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                    </button>
                    <div class="volume-slider-wrap">
                      <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.02" value="1" />
                    </div>
                  </div>
                </div>

                <div class="ctrl-right">
                  <button id="speed-btn" class="ctrl-btn speed-btn" title="Playback Speed">
                    <span id="speed-label">1×</span>
                  </button>

                  <button id="audio-btn" class="ctrl-btn icon-btn" title="Audio Track" id="audio-track-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                  </button>

                  <button id="subtitle-btn" class="ctrl-btn icon-btn" title="Subtitles">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 15h4M15 15h2M7 11h2M13 11h4"/></svg>
                  </button>

                  <button id="fullscreen-btn" class="ctrl-btn" title="Fullscreen (F)">
                    <svg id="fs-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                    <svg id="exit-fs-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Speed Menu -->
          <div id="speed-menu" class="floating-menu hidden">
            <div class="menu-header">Playback Speed</div>
            <div class="menu-items" id="speed-items"></div>
          </div>

          <!-- Audio Track Menu -->
          <div id="audio-menu" class="floating-menu hidden">
            <div class="menu-header">Audio Track</div>
            <div class="menu-items" id="audio-items"></div>
          </div>

          <!-- Subtitle Menu -->
          <div id="subtitle-menu" class="floating-menu hidden">
            <div class="menu-header">Subtitles</div>
            <div class="menu-items" id="subtitle-items"></div>
            <div class="menu-divider"></div>
            <div class="subtitle-settings" id="subtitle-settings">
              <div class="sub-setting-row">
                <label>Size</label>
                <input type="range" id="sub-size" min="60" max="200" value="100" />
                <span id="sub-size-val">100%</span>
              </div>
              <div class="sub-setting-row">
                <label>Opacity</label>
                <input type="range" id="sub-opacity" min="0" max="100" value="90" />
                <span id="sub-opacity-val">90%</span>
              </div>
              <div class="sub-setting-row">
                <label>Background</label>
                <select id="sub-bg">
                  <option value="rgba(0,0,0,0.75)">Dark</option>
                  <option value="transparent">None</option>
                  <option value="rgba(0,0,0,0.5)">Semi</option>
                  <option value="rgba(255,255,255,0.15)">Light</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Resume Banner -->
          <div id="resume-banner" class="resume-banner hidden">
            <span>Resume from <strong id="resume-time-label"></strong>?</span>
            <div class="resume-actions">
              <button id="resume-yes" class="resume-btn resume-yes">Resume</button>
              <button id="resume-no" class="resume-btn resume-no">Start Over</button>
            </div>
          </div>

        </div><!-- end video-wrapper -->

        <!-- Subtitle Track (rendered outside video for custom styling) -->
        <div id="custom-subtitle-container" class="custom-subtitle-container">
          <div id="custom-subtitle" class="custom-subtitle"></div>
        </div>

      </div><!-- end player-container -->
    </section>

    <!-- Footer -->
    <footer id="site-footer">
      <span class="footer-brand">player.mibsam.online</span>
      <span class="footer-note">No data stored · Frontend only</span>
    </footer>

  </div><!-- end app -->

  <!-- Scripts (order matters) -->
  <script src="js/utils.js"></script>
  <script src="js/subtitles.js"></script>
  <script src="js/player.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
